services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: unifiedmind-qdrant
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /readyz HTTP/1.0\\r\\n\" > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  neo4j:
    image: neo4j:community
    container_name: unifiedmind-neo4j
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_backups:/backups
    environment:
      NEO4J_AUTH: neo4j/interpretation
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_max__size: 1G
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "interpretation", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
